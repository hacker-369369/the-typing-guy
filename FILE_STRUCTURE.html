<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Structure - The Typing Guy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0F1117;
            color: #FFFFFF;
            padding: 2rem;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #FFD54F; margin-bottom: 1rem; }
        h2 { color: #00E676; margin-top: 2rem; margin-bottom: 1rem; }
        pre {
            background: #161B22;
            border: 1px solid #30363D;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            color: #FFFFFF;
        }
        .file-type {
            margin-top: 1rem;
            padding: 1rem;
            background: #161B22;
            border-left: 3px solid #FFD54F;
            border-radius: 4px;
        }
        .file-type strong { color: #FFD54F; }
        .description { color: #5C6370; margin-top: 0.5rem; }
        .location { color: #00E676; font-size: 0.9rem; }
        code { background: #30363D; padding: 0.2rem 0.4rem; border-radius: 3px; }
        .important { border-color: #FF5252; }
        .important strong { color: #FF5252; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 The Typing Guy - File Structure</h1>
